<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORTINHO TV - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
        }

        /* TELA DE LOGIN */
        #loginScreen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: #000;
        }
        .login-box {
            background: #141414; padding: 3rem; border-radius: 10px;
            width: 90%; max-width: 400px; text-align: center;
        }
        input, select, textarea {
            width: 100%; padding: 0.8rem; margin: 0.5rem 0;
            background: #333; border: none; color: white; border-radius: 5px;
        }
        .btn-red {
            width: 100%; padding: 1rem; background: #e50914; border: none;
            color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }

        /* APP PRINCIPAL */
        #mainApp { display: none; padding-top: 70px; }
        header {
            background: rgba(0,0,0,0.9); padding: 1rem 0; position: fixed; top: 0; width: 100%; 
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 0; }
        .card {
            background: #181818; border-radius: 8px; overflow: hidden;
            position: relative; transition: 0.3s;
        }
        .card:hover { transform: scale(1.05); }
        .card-info { padding: 15px; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .card-meta { color: #4ecdc4; font-size: 0.8rem; margin-bottom: 8px; }
        .card-desc { color: #aaa; font-size: 0.85rem; height: 50px; overflow: hidden; margin-bottom: 15px; }
        
        .del-btn {
            position: absolute; top: 10px; right: 10px; background: red;
            color: white; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; z-index: 10;
        }
        .play-btn {
            width: 100%; padding: 10px; background: white; color: black;
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1 style="color:#e50914; margin-bottom:20px;">GORDINHO TV</h1>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-red" onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="mainApp">
        <header class="container">
            <div style="font-size: 1.5rem; font-weight: bold; color:#e50914;">GORTINHO TV</div>
            <div style="display: flex; gap: 10px;">
                <button class="admin-only" onclick="openM()" style="padding:5px 15px; cursor:pointer;">+ ADICIONAR</button>
                <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; padding:5px 10px; font-size:12px;">SAIR</button>
            </div>
        </header>

        <div class="container">
            <div id="grid" class="grid"></div>
        </div>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="login-box" style="text-align: left;">
            <h3 style="color:#e50914; margin-bottom:15px;">Novo Filme/Série</h3>
            <input type="file" id="fFile" accept="video/*">
            <input type="text" id="fTitle" placeholder="Título">
            <select id="fType"><option value="filme">Filme</option><option value="serie">Série</option></select>
            <input type="number" id="fRating" placeholder="Nota 1-10">
            <textarea id="fDesc" placeholder="Sinopse" rows="3"></textarea>
            <button class="btn-red" id="saveBtn" onclick="salvar()">SALVAR</button>
            <button onclick="closeM()" style="width:100%; background:none; color:gray; border:none; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        const USERS = { "Miguel": "260711", "user": "12345" };
        let currentUser = "";
        let db;
        // Centralizei o nome do banco para não dar erro
        const DB_NAME = "CineRecsDB_V3"; 
        let movies = JSON.parse(localStorage.getItem('movies_v3')) || [];

        function entrar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (USERS[u] === p) {
                currentUser = u;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                if(u === 'Miguel') document.getElementById('mainApp').classList.add('is-admin');
                conectarDB();
            } else { alert("Login incorreto!"); }
        }

        function conectarDB() {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("videos");
            req.onsuccess = e => { db = e.target.result; listar(); };
        }

        function listar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = movies.map(m => `
                <div class="card">
                    ${currentUser === 'Miguel' ? `<button class="del-btn" onclick="remover('${m.id}')">✕</button>` : ''}
                    <div style="height:150px; background:#222; display:flex; align-items:center; justify-content:center; font-size:3rem;">🎬</div>
                    <div class="card-info">
                        <div class="card-title">${m.title}</div>
                        <div class="card-meta">${m.type.toUpperCase()} • ⭐ ${m.rating || '0'}/10</div>
                        <div class="card-desc">${m.desc || ''}</div>
                        <button class="play-btn" onclick="ver('${m.id}')">ASSISTIR</button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function ver(id) {
            const req = db.transaction("videos").objectStore("videos").get(id);
            req.onsuccess = () => {
                const url = URL.createObjectURL(req.result);
                const win = window.open("", "_blank");
                win.document.write(`
                    <body style="margin:0; background:#000; display:flex; align-items:center; justify-content:center; height:100vh;">
                        <video controls autoplay controlsList="nodownload" oncontextmenu="return false;" style="max-width:100%; max-height:100%;">
                            <source src="${url}">
                        </video>
                    </body>
                `);
            };
        }

        function salvar() {
            const file = document.getElementById('fFile').files[0];
            const title = document.getElementById('fTitle').value;
            if(!file || !title) return alert("Falta vídeo ou título!");

            document.getElementById('saveBtn').disabled = true;
            const id = "vid_" + Date.now();
            
            const tx = db.transaction("videos", "readwrite");
            tx.objectStore("videos").add(file, id).onsuccess = () => {
                movies.push({
                    id, title, 
                    type: document.getElementById('fType').value,
                    rating: document.getElementById('fRating').value,
                    desc: document.getElementById('fDesc').value
                });
                localStorage.setItem('movies_v3', JSON.stringify(movies));
                closeM();
                document.getElementById('saveBtn').disabled = false;
                listar();
            };
        }

        function remover(id) {
            if(confirm("Apagar para sempre?")) {
                // Remove da lista visual
                movies = movies.filter(m => m.id !== id);
                localStorage.setItem('movies_v3', JSON.stringify(movies));
                
                // Remove do banco de arquivos
                const tx = db.transaction("videos", "readwrite");
                tx.objectStore("videos").delete(id).onsuccess = () => {
                    listar();
                };
            }
        }

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
