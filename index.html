<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gordinho Stream (BETA)</title>
    
    <style>
        :root { --main-color: #e50914; --bg-color: #050505; }
        body { background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        header { padding: 20px; text-align: center; background: #000; border-bottom: 2px solid var(--main-color); position: sticky; top: 0; z-index: 100; }
        
        /* Estilo do novo texto abaixo do título */
        .subtitle { 
            color: #888; 
            font-size: 14px; 
            margin-top: -10px; 
            margin-bottom: 15px; 
            font-weight: normal; 
            letter-spacing: 1px;
        }

        .search-container { margin: 20px 0; }
        input { padding: 12px; width: 60%; border-radius: 5px; border: none; background: #222; color: white; outline: none; }
        button { padding: 12px 20px; background: var(--main-color); color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .movie-card {
            cursor: pointer;
            transition: 0.3s;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #222;
        }
        .movie-card:hover { transform: scale(1.05); border: 1px solid var(--main-color); }
        .movie-card img { width: 100%; display: block; }
        .movie-info { padding: 10px; font-size: 13px; text-align: center; font-weight: bold; }

        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            width: 98%;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            overflow: hidden; /* Corta o que sobrar */
            background: #000;
        }

        /* Truque para esconder o embedmovies.org no canto superior */
        .video-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 180px; /* Largura para cobrir o texto */
            height: 40px;  /* Altura da marca d'água */
            background: black; 
            z-index: 10;
            pointer-events: none;
        }

        iframe { 
            width: 100% !important; 
            height: auto !important; 
            aspect-ratio: 16 / 9; 
            border: none; 
        }

        .close-btn { margin-bottom: 15px; padding: 10px 25px; background: var(--main-color); color: white; border: none; cursor: pointer; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>GORDINHO STREAM</h1>
    <p class="subtitle">O melhor do cinema na palma da sua mão</p>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Busque um filme ou série...">
        <button onclick="searchContent()">BUSCAR</button>
    </div>
</header>

<div class="movie-grid" id="movieGrid"></div>

<div id="player-overlay">
    <button class="close-btn" onclick="closePlayer()">FECHAR X</button>
    <div id="video-content" class="video-wrapper"></div>
</div>

<script>
    const API_KEY = '8e6a4fe3b8b0c240511a0c5cc382ca81';
    const grid = document.getElementById('movieGrid');

    async function loadPopular() {
        const url = `https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}&language=pt-BR`;
        fetchData(url);
    }

    async function searchContent() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;
        grid.innerHTML = "<p>Buscando...</p>";
        const url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=pt-BR&query=${query}`;
        fetchData(url);
    }

    async function fetchData(url) {
        try {
            const res = await fetch(url);
            const data = await res.json();
            grid.innerHTML = "";
            
            data.results.forEach(item => {
                if(!item.poster_path) return;
                const isTV = item.media_type === 'tv' || !item.release_date;
                const title = item.title || item.name;
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                    <div class="movie-info">${title}</div>
                `;
                card.onclick = () => openPlayer(item.id, isTV);
                grid.appendChild(card);
            });
        } catch (error) {
            grid.innerHTML = "<p>Erro ao conectar com o TMDB.</p>";
        }
    }

    function openPlayer(id, isTV) {
        const type = isTV ? 'serie' : 'filme';
        const videoSource = `https://myembed.biz/${type}/${id}`; 

        document.getElementById('player-overlay').style.display = 'flex';
        const container = document.getElementById('video-content');
        
        container.innerHTML = `
            <iframe 
                src="${videoSource}" 
                allowfullscreen 
                scrolling="no"
                loading="lazy">
            </iframe>
        `;
    }

    function closePlayer() {
        document.getElementById('video-content').innerHTML = ""; 
        document.getElementById('player-overlay').style.display = 'none';
    }

    loadPopular();
</script>

</body>
</html>
