<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO TV - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #141414; padding: 2rem; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #222; }
        input, select, textarea { width: 100%; padding: 0.8rem; margin: 0.5rem 0; background: #333; border: none; color: white; border-radius: 5px; }
        .btn-red { width: 100%; padding: 1rem; background: #e50914; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #mainApp { display: none; padding-top: 70px; }
        header { background: rgba(0,0,0,0.9); padding: 1rem 0; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: inline-block !important; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 0; }
        .card { background: #181818; border-radius: 8px; overflow: hidden; position: relative; transition: 0.3s; border: 1px solid #222; }
        .card-info { padding: 15px; }
        .play-btn { width: 100%; padding: 10px; background: white; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); border: none; color: white; padding: 5px; border-radius: 5px; cursor: pointer; z-index: 10; }
        
        .user-list { margin-top: 15px; background: #222; border-radius: 5px; max-height: 250px; overflow-y: auto; text-align: left; padding: 10px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .user-info { display: flex; flex-direction: column; }
        .status-on { color: #00ff00; font-size: 0.7rem; }
        .status-off { color: #666; font-size: 0.7rem; }

        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; flex-direction: column; }
        .player-header { padding: 15px; background: #141414; display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1 style="color:#e50914; margin-bottom:20px;">GORDINHO TV</h1>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-red" onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div class="container">
                <div style="font-size: 1.5rem; font-weight: bold; color:#e50914;">GORTINHO TV</div>
                <div>
                    <button class="admin-only" onclick="abrirModalUsers()" style="background:#333; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-right:5px;">👥 USUÁRIOS</button>
                    <button class="admin-only" onclick="document.getElementById('modal').style.display='flex'" style="background:#e50914; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">+ FILME</button>
                    <button onclick="sair()" style="background:none; color:gray; border:none; padding:8px; cursor:pointer; font-size:0.8rem;">Sair</button>
                </div>
            </div>
        </header>
        <div class="container"><div id="grid" class="grid"></div></div>
    </div>

    <div id="modalUsers" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="login-box" style="text-align: left; max-width: 450px;">
            <h3 style="color:#e50914; margin-bottom:10px;">Gerenciar Acessos</h3>
            <input type="text" id="newU" placeholder="Nome do Usuário">
            <input type="text" id="newP" placeholder="Senha">
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="font-size: 0.7rem; color: #aaa;">Validade:</label>
                    <select id="newT">
                        <option value="1 dia">1 Dia</option>
                        <option value="1 mês">1 Mês</option>
                        <option value="1 ano">1 Ano</option>
                        <option value="Personalizado">Personalizado</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 0.7rem; color: #aaa;">Limite de Telas:</label>
                    <input type="number" id="newL" value="1" min="1" style="margin:0;">
                </div>
            </div>
            
            <input type="text" id="tPerso" placeholder="Tempo Personalizado" style="display:none;">

            <button class="btn-red" onclick="salvarUsuario()">CRIAR ACESSO</button>
            <div class="user-list" id="listaU"></div>
            <button onclick="document.getElementById('modalUsers').style.display='none'" style="width:100%; background:none; color:gray; border:none; margin-top:10px; cursor:pointer;">Fechar</button>
        </div>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="login-box" style="text-align: left;">
            <h3 style="color:#e50914;">Novo Filme</h3>
            <input type="text" id="fUrl" placeholder="Link do Filme">
            <input type="text" id="fTitle" placeholder="Título">
            <input type="number" id="fRating" placeholder="Nota (1-10)">
            <textarea id="fDesc" placeholder="Sinopse"></textarea>
            <button class="btn-red" onclick="salvarNoFirebase()">SALVAR NA NUVEM</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:none; color:gray; border:none; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="videoOverlay">
        <div class="player-header">
            <span id="playingTitle" style="font-weight:bold;">Assistindo...</span>
            <button onclick="fecharPlayer()" style="background:#e50914; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">FECHAR X</button>
        </div>
        <div id="playerContent" style="width:100%; height:100%;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnzpPFdXKzmQbEOkAyY9Y1PJ1tl8cX5VA",
            authDomain: "gordinhotv-25f29.firebaseapp.com",
            databaseURL: "https://gordinhotv-25f29-default-rtdb.firebaseio.com",
            projectId: "gordinhotv-25f29",
            storageBucket: "gordinhotv-25f29.firebasestorage.app",
            messagingSenderId: "416261508283",
            appId: "1:416261508283:web:53960003c89a9df7de2d9e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ADMS = ["Miguel", "Brunno"];
        let userLogado = "";
        let idSessao = "";

        document.getElementById('newT').onchange = function() {
            document.getElementById('tPerso').style.display = this.value === "Personalizado" ? "block" : "none";
        };

        function entrar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            db.ref('usuarios').once('value', (snap) => {
                const users = snap.val();
                let userRef = null;
                let userId = null;

                if(users) {
                    Object.keys(users).forEach(id => {
                        if(users[id].nome === u && users[id].senha === p) {
                            userRef = users[id];
                            userId = id;
                        }
                    });
                }

                if(userRef) {
                    const telasAtivas = userRef.onlineCount || 0;
                    const limite = parseInt(userRef.limite) || 1;

                    if(telasAtivas >= limite && !ADMS.includes(u)) {
                        alert("Limite de " + limite + " tela(s) atingido!");
                        return;
                    }

                    userLogado = u;
                    idSessao = userId;
                    db.ref('usuarios/' + userId).update({ onlineCount: telasAtivas + 1 });
                    carregarApp();
                } else if(p === "260711" || p === "123") {
                    userLogado = u;
                    carregarApp();
                } else { alert("Senha incorreta!"); }
            });
        }

        function carregarApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if(ADMS.includes(userLogado)) document.getElementById('mainApp').classList.add('is-admin');
            escutarBanco();
        }

        function sair() {
            if(idSessao) {
                db.ref('usuarios/' + idSessao).once('value', (s) => {
                    const count = s.val().onlineCount || 1;
                    db.ref('usuarios/' + idSessao).update({ onlineCount: Math.max(0, count - 1) });
                    location.reload();
                });
            } else { location.reload(); }
        }

        function salvarUsuario() {
            const nome = document.getElementById('newU').value;
            const senha = document.getElementById('newP').value;
            const limite = document.getElementById('newL').value;
            const tempoSel = document.getElementById('newT').value;
            const tempo = tempoSel === "Personalizado" ? document.getElementById('tPerso').value : tempoSel;

            if(nome && senha) {
                db.ref('usuarios').push({ nome, senha, tempo, limite, onlineCount: 0 });
                alert("Usuário Criado!");
                document.getElementById('newU').value = "";
                document.getElementById('newP').value = "";
            }
        }

        function abrirModalUsers() {
            document.getElementById('modalUsers').style.display = 'flex';
            db.ref('usuarios').on('value', (snap) => {
                const lista = document.getElementById('listaU');
                lista.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(id => {
                        lista.innerHTML += `
                            <div class="user-item">
                                <div class="user-info">
                                    <strong>${data[id].nome}</strong>
                                    <span style="font-size:0.7rem; color:#aaa;">Expira: ${data[id].tempo}</span>
                                    <span class="${data[id].onlineCount > 0 ? 'status-on' : 'status-off'}">
                                        Telas: ${data[id].onlineCount || 0} / ${data[id].limite || 1}
                                    </span>
                                </div>
                                <button onclick="removerU('${id}')" style="background:none; border:none; color:#e50914; cursor:pointer;">Excluir</button>
                            </div>
                        `;
                    });
                }
            });
        }

        function removerU(id) {
            if(confirm("Remover usuário?")) db.ref('usuarios/' + id).remove();
        }

        function salvarNoFirebase() {
            const movie = {
                title: document.getElementById('fTitle').value,
                url: document.getElementById('fUrl').value,
                rating: document.getElementById('fRating').value,
                desc: document.getElementById('fDesc').value,
                id: Date.now()
            };
            db.ref('filmes/' + movie.id).set(movie);
            document.getElementById('modal').style.display = 'none';
        }

        function escutarBanco() {
            db.ref('filmes').on('value', (snapshot) => {
                const data = snapshot.val();
                const grid = document.getElementById('grid');
                grid.innerHTML = "";
                if(data) {
                    Object.values(data).reverse().forEach(m => {
                        grid.innerHTML += `
                            <div class="card">
                                ${ADMS.includes(userLogado) ? `<button class="del-btn" onclick="remover('${m.id}')">Excluir</button>` : ''}
                                <div style="height:150px; background:#222; display:flex; align-items:center; justify-content:center; font-size:3rem;">🎬</div>
                                <div class="card-info">
                                    <div class="card-title">${m.title}</div>
                                    <div class="card-meta">⭐ ${m.rating}/10</div>
                                    <p style="font-size:0.8rem; color:#aaa;">${m.desc}</p>
                                    <button class="play-btn" onclick="abrirPlayer('${m.url}', '${m.title}')">ASSISTIR AGORA</button>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        }

        function abrirPlayer(url, titulo) {
            let finalUrl = url;
            if(url.includes('drive.google.com')) {
                // Força o modo preview para o Drive
                finalUrl = url.replace('/view', '/preview');
            }
            
            document.getElementById('playingTitle').innerText = titulo;
            
            // O sandbox bloqueia downloads e saídas externas do iframe
            document.getElementById('playerContent').innerHTML = `
                <iframe 
                    src="${finalUrl}" 
                    allow="autoplay; fullscreen" 
                    allowfullscreen 
                    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation">
                </iframe>`;
            
            document.getElementById('videoOverlay').style.display = 'flex';
        }

        function fecharPlayer() {
            document.getElementById('playerContent').innerHTML = "";
            document.getElementById('videoOverlay').style.display = 'none';
        }

        function remover(id) {
            if(confirm("Apagar filme?")) db.ref('filmes/' + id).remove();
        }
    </script>
</body>
</html>
